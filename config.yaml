# 쏠림 알림 기준 (비중이 이 값을 넘으면 알림)
concentration_threshold: 0.25   # 종목 1개 비중 25% 초과 시 알림
sector_threshold: 0.40          # 섹터 비중 40% 초과 시 알림

# Notion 연동 (3번 기능). 안 쓰면 enabled: false 그대로 두세요.
notion:
  enabled: false
  token: ""              # Notion 내부 통합 토큰 (secret_...)
  parent_page_id: ""     # DB를 만들 부모 페이지 ID (최초 1회 --setup-notion 용)
  database_id: ""        # --setup-notion 실행 후 출력된 값을 여기 입력

# 리밸런싱 목표 비중 (총자산=주식+현금성 기준)
group_targets:
  1군: 0.50
  2군: 0.20
  3군: 0.10
  현금성: 0.20

# 계좌 역할 (정리 규칙 — 아이디어 3)
account_roles:
  삼성7081: "미국 1군"
  키움5154: "국내주식 전부 + 미국 2군"
  키움5978: "미국 3군"
  미래에셋356: "그 외 (미분류)"

